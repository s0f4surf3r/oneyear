                        style={{background:'#C7B3FF'}}>
                        <Plus className="w-4 h-4"/> Ereignis
                      </button>
                      
                      <button 
                        onClick={() => {
                          setNewBirthday({
                            firstName: '',
                            lastName: '',
                            birthDate: showDayEvents.date,
                            info: ''
                          });
                          setShowAddBirthday(true);
                          setShowAddEvent(false);
                          setEditingEvent(null);
                          setShowDayEvents(null);
                          window.scrollTo({ top: 0, behavior: 'smooth' });
                        }}
                        className="px-3 py-2 text-white rounded hover:opacity-90 flex items-center justify-center gap-2"
                        style={{background:'#FF69B4'}}>
                        <Plus className="w-4 h-4"/> Geburtstag
                      </button>
                    </div>
                  )}
                </div>
              </div>
            )}

            {/* Feiertage/Ferien Dialoge */}
            {showHolidayDialog && (
              <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 p-4" onClick={()=>setShowHolidayDialog(false)}>
                <div className="bg-white rounded-lg shadow-xl max-w-md w-full p-4" onClick={(e)=>e.stopPropagation()}>
                  <div className="flex items-center justify-between mb-3">
                    <h3 className="font-bold text-lg">Feiertage hinzufügen</h3>
                    <button onClick={()=>setShowHolidayDialog(false)} className="text-gray-500 hover:text-gray-700"><X className="w-5 h-5"/></button>
                  </div>
                  <p className="text-sm text-gray-600 mb-4">Wähle dein Bundesland aus, um die Feiertage für {currentYear} hinzuzufügen.</p>
                  <select value={selectedBundesland} onChange={(e)=>setSelectedBundesland(e.target.value)} className="w-full px-3 py-2 border rounded mb-4">
                    {bundeslaender.map(bl => <option key={bl} value={bl}>{bl}</option>)}
                  </select>
                  <button
                    onClick={()=>{
                      const holidays = getHolidaysForYear(currentYear, selectedBundesland);
                      holidays.forEach(saveEvent);
                      setShowHolidayDialog(false);
                      alert(`Feiertage für ${selectedBundesland} wurden hinzugefügt!`);
                    }}
                    className="w-full px-4 py-2 text-white rounded hover:opacity-90"
                    style={{background:'#FFD4B8', color:'#7A3E00'}}
                  >Feiertage hinzufügen</button>
<button
  onClick={removeHolidays}
  className="w-full px-4 py-2 rounded border text-red-600 hover:bg-red-50 mt-2"
  title="Alle eingetragenen Feiertage dieses Jahres entfernen"
>
  Feiertage entfernen
</button>

                </div>
              </div>
            )}

            {showVacationDialog && (
              <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 p-4" onClick={()=>setShowVacationDialog(false)}>
                <div className="bg-white rounded-lg shadow-xl max-w-md w-full p-4" onClick={(e)=>e.stopPropagation()}>
                  <div className="flex items-center justify-between mb-3">
                    <h3 className="font-bold text-lg">Schulferien hinzufügen</h3>
                    <button onClick={()=>setShowVacationDialog(false)} className="text-gray-500 hover:text-gray-700"><X className="w-5 h-5"/></button>
                  </div>
                  <p className="text-sm text-gray-600 mb-4">Wähle dein Bundesland aus, um die Schulferien für {currentYear} hinzuzufügen.</p>
                  <select value={selectedBundesland} onChange={(e)=>setSelectedBundesland(e.target.value)} className="w-full px-3 py-2 border rounded mb-4">
                    {bundeslaender.map(bl => <option key={bl} value={bl}>{bl}</option>)}
                  </select>
                  <button
                    onClick={()=>{
                      const vacations = getVacationsForYear(currentYear, selectedBundesland);
                      if (vacations.length === 0) {
                        alert(`Keine Feriendaten für ${selectedBundesland} verfügbar. Bitte manuell eintragen.`);
                      } else {
                        vacations.forEach(v => saveEvent({ ...v, color:'#B8E6D5', type:'vacation' }));
                        setShowVacationDialog(false);
                        alert(`Schulferien für ${selectedBundesland} wurden hinzugefügt!`);
                      }
                    }}
                    className="w-full px-4 py-2 text-white rounded hover:opacity-90"
                    style={{background:'#B8E6D5', color:'#074D3B'}}
                  >Ferien hinzufügen</button>
<button
  onClick={removeVacations}
  className="w-full px-4 py-2 rounded border text-red-600 hover:bg-red-50 mt-2"
  title="Alle eingetragenen Ferientermine dieses Jahres entfernen"
>
  Ferien entfernen
</button>

                </div>
              </div>
            )}

            {/* Export-Dialog nach Erstellung */}
            {exportEvent && (
              <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 p-4" onClick={()=>setExportEvent(null)}>
                <div className="bg-white rounded-lg shadow-xl max-w-md w-full p-4" onClick={(e)=>e.stopPropagation()}>
                  <div className="flex items-center justify-between mb-3">
                    <h3 className="font-bold text-lg">Zum Kalender hinzufügen?</h3>
                    <button onClick={()=>setExportEvent(null)} className="text-gray-500 hover:text-gray-700"><X className="w-5 h-5"/></button>
                  </div>
                  <p className="text-sm text-gray-700 mb-4">
                    „{exportEvent.title}“<br/>
                    {exportEvent.startDate === exportEvent.endDate
                      ? new Date(exportEvent.startDate).toLocaleDateString('de-DE', { day:'2-digit', month:'long', year:'numeric' })
                      : `${new Date(exportEvent.startDate).toLocaleDateString('de-DE',{day:'2-digit',month:'long'})} – ${new Date(exportEvent.endDate).toLocaleDateString('de-DE',{day:'2-digit',month:'long',year:'numeric'})}`}
                  </p>
                  <div className="grid grid-cols-1 gap-2">
                    <button onClick={()=>downloadIcs(exportEvent)} className="px-3 py-2 text-white rounded hover:opacity-90" style={{background:'#4A90E2'}}>.ics öffnen/ speichern (Apple/iCloud)</button>
                    <button onClick={()=>openGoogle(exportEvent)} className="px-3 py-2 text-white rounded hover:opacity-90" style={{background:'#87C4A3'}}>Zu Google Calendar</button>
                    <button onClick={()=>openOutlook(exportEvent)} className="px-3 py-2 text-white rounded hover:opacity-90" style={{background:'#9370DB'}}>Zu Outlook.com</button>
                    <button onClick={()=>setExportEvent(null)} className="px-3 py-2 rounded border text-gray-700 hover:bg-gray-50">Fertig</button>
                  </div>
                </div>
              </div>
            )}

            {/* Mehr-Menü */}
            {showMoreMenu && (
              <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 p-4" onClick={()=>setShowMoreMenu(false)}>
                <div className="bg-white rounded-lg shadow-xl max-w-md w-full p-4" onClick={(e)=>e.stopPropagation()}>
                  <div className="flex items-center justify-between mb-3">
                    <h3 className="font-bold text-lg">Weitere Optionen</h3>
                    <button onClick={()=>setShowMoreMenu(false)} className="text-gray-500 hover:text-gray-700"><X className="w-5 h-5"/></button>
                  </div>
                  <div className="grid grid-cols-1 gap-2">
                    <button 
                      onClick={()=>{ setShowMoreMenu(false); setShowVacationDialog(true); }}
                      className="px-3 py-2 text-white rounded hover:opacity-90 text-left"
                      style={{background:'#B8E6D5', color:'#074D3B'}}>
                      🏖️ Schulferien hinzufügen
                    </button>
                    <button 
                      onClick={()=>{ setShowMoreMenu(false); setShowHolidayDialog(true); }}
                      className="px-3 py-2 text-white rounded hover:opacity-90 text-left"
                      style={{background:'#FFD4B8', color:'#7A3E00'}}>
                      🎉 Feiertage hinzufügen
                    </button>
                    <button 
                      onClick={importBirthdaysFromLastYear}
                      className="px-3 py-2 text-white rounded hover:opacity-90 text-left"
                      style={{background:'#FF69B4'}}>
                      🎂 Geburtstage aus Vorjahr übertragen
                    </button>
                    <button 
                      onClick={()=>{ setShowMoreMenu(false); window.print(); }}
                      className="px-3 py-2 text-white rounded hover:opacity-90 text-left"
                      style={{background:'#4B5563'}}>
                      🖨️ Kalender drucken
                    </button>
                    <button 
                      onClick={() => setIsCompactView(!isCompactView)}
                      className="px-3 py-2 rounded hover:opacity-90 text-left"
                      style={{background:'#9CA3AF', color:'white'}}>
                      🔍 Auflösung {isCompactView ? 'vergrößern' : 'verkleinern'}
                    </button>
                    <button 
                      onClick={()=>setShowMoreMenu(false)} 
                      className="px-3 py-2 rounded border text-gray-700 hover:bg-gray-50">
                      Schließen
                    </button>
                  </div>
                </div>
              </div>
            )}

            {/* User-Auswahl Dialog */}
            {showUserSelection && (
              <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 p-4">
                <div className="bg-white rounded-lg shadow-xl max-w-md w-full p-6" onClick={(e)=>e.stopPropagation()}>
                  <h3 className="font-bold text-xl mb-2">Willkommen beim OneYear Kalender!</h3>
                  <p className="text-gray-600 mb-4">Bitte wähle deinen Namen aus:</p>
                  <div className="grid grid-cols-1 gap-3">
                    {['Jochen', 'Katja', 'Zoe'].map(name => (
                      <button
                        key={name}
                        onClick={() => {
                          setCurrentUser(name);
                          setIsViewOnly(false);
                          localStorage.setItem('oneyear_current_user', name);
                          localStorage.setItem('oneyear_view_only', 'false');
                          setShowUserSelection(false);
                        }}
                        className="px-4 py-3 text-lg font-semibold text-white rounded hover:opacity-90"
                        style={{background:'#4A90E2'}}
                      >
                        {name}
                      </button>
                    ))}
                    <button
                      onClick={() => {
                        setCurrentUser('Gast');
                        setIsViewOnly(true);
                        localStorage.setItem('oneyear_current_user', 'Gast');
                        localStorage.setItem('oneyear_view_only', 'true');
                        setShowUserSelection(false);
                      }}
                      className="px-4 py-3 text-lg font-semibold text-gray-700 rounded hover:opacity-90 border-2 border-gray-300"
                      style={{background:'#F3F4F6'}}
                    >
                      🔒 Gast / Nur anschauen
                    </button>
                  </div>
                </div>
              </div>
            )}

            <div className="text-center mt-4 text-gray-500 text-sm">© {currentYear} OneYear Kalender – Synchronisiert mit Firebase 🔥</div>
          </div>
        </div>
      );
    };

    ReactDOM.render(<FamilyYearCalendar />, document.getElementById('root'));
  </script>
</body>
</html>
